<mat-form-field
  class="ngssm-regex-control"
  id="expressionControl"
  [class.ngssm-regex-open]="testingControlOpen()">
  <mat-label>
    {{ label() }}
  </mat-label>
  <input
    matInput
    [formControl]="patternControl"
    [required]="required()"
    #element />
  <button
    matSuffix
    mat-icon-button
    (click)="$event.stopPropagation(); toggleTestingControlVisibility()"
    [disabled]="isDisabled()"
    id="toggleButton"
    cdkOverlayOrigin
    #trigger="cdkOverlayOrigin"
    [matTooltip]="
      testingControlOpen() === false ? 'Open panel to enter a string to be used to check the regular expression.' : 'Close panel'
    ">
    <mat-icon class="fa-solid" [class.fa-angles-up]="testingControlOpen()" [class.fa-angles-down]="!testingControlOpen()"></mat-icon>
  </button>
  @if (validationError(); as error) {
    <mat-error> {{ error }} </mat-error>
  }

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="trigger"
    [cdkConnectedOverlayOpen]="testingControlOpen()"
    [cdkConnectedOverlayPositions]="overlayPositions">
    <div class="mat-elevation-z8 ngssm-regex-testing-container" [style.width.px]="elementRef.nativeElement.getBoundingClientRect().width">
      <mat-form-field>
        <mat-label>Enter a string to test regular expression</mat-label>
        <input matInput [formControl]="testingStringControl" />
        <mat-icon
          matSuffix
          class="fa-solid"
          [class.fa-check]="isMatch()"
          [class.ngssm-success]="isMatch()"
          [class.fa-xmark]="!isMatch()"
          [class.ngssm-error]="!isMatch()">
        </mat-icon>
      </mat-form-field>
    </div>
  </ng-template>
</mat-form-field>
